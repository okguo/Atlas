spring.application.name=atlas-server
server.port=8080

atlas.db.primary.type=mysql
atlas.db.primary.url=jdbc:mysql://localhost:3306/atlas?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
atlas.db.primary.username=root
atlas.db.primary.password=

atlas.db.secondary.path=./data/local.db

atlas.llm.api-key=
atlas.llm.model=gpt-4-turbo

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

logging.level.com.atlas=DEBUG
logging.level.org.springframework=INFO
