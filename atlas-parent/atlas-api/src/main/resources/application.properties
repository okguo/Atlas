mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.atlas.core

atlas.db.type=mysql
atlas.db.primary.url=jdbc:mysql://localhost:3306/atlas?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf8mb4
atlas.db.primary.username=root
atlas.db.primary.password=

atlas.db.secondary.path=./data/local.db

atlas.llm.api-key=
atlas.llm.model=gpt-4-turbo

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

logging.level.com.atlas=DEBUG
logging.level.com.baomidou=DEBUG
logging.level.org.springframework=INFO
logging.level.org.apache.ibatis=INFO
